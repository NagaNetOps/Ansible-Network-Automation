# Sample Data Exchange Services Update Configuration
# Used with: operation: update_services
#
# Only 'serviceName' and 'policy.prefixTags' are required.
# All other policy fields (serviceLanSegment, type, site, description)
# are read from the existing service via the API and preserved as-is.
#
# Rules:
# - The service must already exist (use create_services to create new services).
# - At least one prefix must remain; removing all prefixes is not allowed.
# - Supports --check (dry run) and --diff (preview changes) flags.
#
# Preview changes before applying:
#   ansible-playbook ... --check --diff
# Apply changes:
#   ansible-playbook ...

data_exchange_services:
  - serviceName: "de-service-1"
    policy:
      prefixTags:
        - prefix: "100.1.1.0/24"
          tag: "new-s-1-prefix1"
