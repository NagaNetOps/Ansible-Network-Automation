---
# Data Exchange - Accept Invitation Playbook (Workflow 4)
# Accepts a Data Exchange service invitation for a non-Graphiant customer with
# gateway deployment and VPN configuration. Idempotent: already-linked consumers are skipped.
#
# Secrets (BGP MD5 password, custom PSKs) are never written to disk — loaded via include_vars
# and passed to the module. Sensitive arguments are declared no_log=True in the module and masked
# in library logs. Any secrets store can be used: for Ansible Vault, run with --vault-password-file;
# for other stores, pre-fetch and pass as extra vars.
# See configs/vault_secrets.yml.example for the expected dict structure.
#
# Usage:
#   Preview (dry run):
#     ansible-playbook ansible_collections/graphiant/naas/playbooks/de_workflows/07_dataex_accept_invitation.yml --check
#
#   Apply:
#     ansible-playbook ansible_collections/graphiant/naas/playbooks/de_workflows/07_dataex_accept_invitation.yml
#
#   Custom config file:
#     ansible-playbook ... -e config_file=de_workflows_configs/sample_data_exchange_acceptance.yaml
#
#   Custom matches file (optional - falls back to API lookup if omitted):
#     ansible-playbook ... -e matches_file=de_workflows_configs/output/sample_data_exchange_matches_responses_latest.json
#
#   Both:
#     ansible-playbook ... -e config_file=... -e matches_file=...
#
#   With vault secrets (BGP MD5 password, custom PSKs):
#     ansible-playbook ... --vault-password-file ansible_collections/graphiant/naas/configs/vault-password-file.sh
#     Default vault file: configs/de_workflows_configs/vault_secrets.yml (relative to collection root).
#     Override: -e vault_secrets_file=/path/to/your/vault_secrets.yml
#     Vault is optional — if the file is absent the task is skipped gracefully:
#       md5Password stays null (no BGP MD5 auth); PSKs are auto-filled by the API.

- name: Data Exchange - Accept Invitation
  hosts: localhost
  gather_facts: false
  vars:
    graphiant_client_params: &graphiant_client_params
      host: "{{ graphiant_host | default(lookup('env', 'GRAPHIANT_HOST')) }}"
      username: "{{ graphiant_username | default(lookup('env', 'GRAPHIANT_USERNAME')) }}"
      password: "{{ graphiant_password | default(lookup('env', 'GRAPHIANT_PASSWORD')) }}"
      access_token: "{{ graphiant_access_token | default(lookup('env', 'GRAPHIANT_ACCESS_TOKEN')) }}"
    vault_secrets_path: "{{ vault_secrets_file | default(playbook_dir + '/../../configs/de_workflows_configs/vault_secrets.yml') }}"

  tasks:

    - name: Load vault secrets for Data Exchange (BGP MD5, custom PSKs)
      ansible.builtin.include_vars:
        file: "{{ vault_secrets_path }}"
      no_log: true
      when: vault_secrets_path is file

    - name: Get Data Exchange services summary
      graphiant.naas.graphiant_data_exchange_info:
        <<: *graphiant_client_params
        query: services_summary
        detailed_logs: true
      register: services_summary

    - name: Display services summary
      ansible.builtin.debug:
        msg: "{{ services_summary.msg }}"

    - name: Accept Data Exchange service invitation
      graphiant.naas.graphiant_data_exchange:
        <<: *graphiant_client_params
        operation: accept_invitation
        config_file: "{{ config_file | default('de_workflows_configs/sample_data_exchange_acceptance.yaml') }}"
        # matches_file is optional. When provided, match_id is resolved from the file (with API
        # fallback if the entry is missing). When omitted, match_id is resolved entirely via API
        # (works as long as the service is visible to the consumer tenant).
        matches_file: "{{ matches_file | default(omit) }}"
        # Vault secrets: loaded from vault_secrets.yml by the task above.
        # vault_data_exchange_bgp_md5_passwords: keyed by customerName; fills md5Password when null in YAML.
        # vault_data_exchange_psk: keyed by customerName → peer name → tunnel; fills psk when null in YAML.
        vault_data_exchange_bgp_md5_passwords: "{{ vault_data_exchange_bgp_md5_passwords | default({}) }}"
        vault_data_exchange_psk: "{{ vault_data_exchange_psk | default({}) }}"
        detailed_logs: true
      register: accept_result

    - name: Display acceptance result
      ansible.builtin.debug:
        msg: "{{ accept_result.result_msg }}"

    - name: Get updated Data Exchange services summary
      graphiant.naas.graphiant_data_exchange_info:
        <<: *graphiant_client_params
        query: services_summary
        detailed_logs: true
      register: updated_services_summary

    - name: Display updated services summary
      ansible.builtin.debug:
        msg: "{{ updated_services_summary.msg }}"
