---
# Data Exchange - Update Customers Playbook (Workflow 2b)
# Updates the email list on existing Data Exchange customers.
#
# Usage:
#   Preview changes (dry run + diff):
#     ansible-playbook ansible_collections/graphiant/naas/playbooks/de_workflows/02b_dataex_update_customers.yml --check --diff
#
#   Apply changes:
#     ansible-playbook ansible_collections/graphiant/naas/playbooks/de_workflows/02b_dataex_update_customers.yml
#
#   Custom config file:
#     ansible-playbook ... -e config_file=de_workflows_configs/sample_data_exchange_customers_update.yaml

- name: Data Exchange - Update Customers
  hosts: localhost
  gather_facts: false
  vars:
    graphiant_client_params: &graphiant_client_params
      host: "{{ graphiant_host | default(lookup('env', 'GRAPHIANT_HOST')) }}"
      username: "{{ graphiant_username | default(lookup('env', 'GRAPHIANT_USERNAME')) }}"
      password: "{{ graphiant_password | default(lookup('env', 'GRAPHIANT_PASSWORD')) }}"
      access_token: "{{ graphiant_access_token | default(lookup('env', 'GRAPHIANT_ACCESS_TOKEN')) }}"

  tasks:
    - name: Get current Data Exchange customers summary
      graphiant.naas.graphiant_data_exchange_info:
        <<: *graphiant_client_params
        query: customers_summary
        detailed_logs: true
      register: customers_summary_before

    - name: Display current customers summary
      ansible.builtin.debug:
        msg: "{{ customers_summary_before.msg }}"

    - name: Update Data Exchange customers
      graphiant.naas.graphiant_data_exchange:
        <<: *graphiant_client_params
        operation: update_customers
        config_file: "{{ config_file | default('de_workflows_configs/sample_data_exchange_customers_update.yaml') }}"
        detailed_logs: true
      register: update_customers_result

    - name: Display update result
      ansible.builtin.debug:
        msg: "{{ update_customers_result.msg }}"

    - name: Get updated Data Exchange customers summary
      graphiant.naas.graphiant_data_exchange_info:
        <<: *graphiant_client_params
        query: customers_summary
        detailed_logs: true
      register: customers_summary_after

    - name: Display updated customers summary
      ansible.builtin.debug:
        msg: "{{ customers_summary_after.msg }}"
