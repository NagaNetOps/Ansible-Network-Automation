---
# Data Exchange - Update Services Playbook (Workflow 1b)
# Updates prefixTags on existing Data Exchange services.
#
# Usage:
#   Preview changes (dry run + diff):
#     ansible-playbook ansible_collections/graphiant/naas/playbooks/de_workflows/01b_dataex_update_services.yml --check --diff
#
#   Apply changes:
#     ansible-playbook ansible_collections/graphiant/naas/playbooks/de_workflows/01b_dataex_update_services.yml
#
#   Custom config file:
#     ansible-playbook ... -e config_file=de_workflows_configs/sample_data_exchange_services_update.yaml

- name: Data Exchange - Update Services
  hosts: localhost
  gather_facts: false
  vars:
    graphiant_client_params: &graphiant_client_params
      host: "{{ graphiant_host | default(lookup('env', 'GRAPHIANT_HOST')) }}"
      username: "{{ graphiant_username | default(lookup('env', 'GRAPHIANT_USERNAME')) }}"
      password: "{{ graphiant_password | default(lookup('env', 'GRAPHIANT_PASSWORD')) }}"
      access_token: "{{ graphiant_access_token | default(lookup('env', 'GRAPHIANT_ACCESS_TOKEN')) }}"

  tasks:
    - name: Get current Data Exchange services summary
      graphiant.naas.graphiant_data_exchange_info:
        <<: *graphiant_client_params
        query: services_summary
        detailed_logs: true
      register: services_summary_before

    - name: Display current services summary
      ansible.builtin.debug:
        msg: "{{ services_summary_before.msg }}"

    - name: Update Data Exchange services
      graphiant.naas.graphiant_data_exchange:
        <<: *graphiant_client_params
        operation: update_services
        config_file: "{{ config_file | default('de_workflows_configs/sample_data_exchange_services_update.yaml') }}"
        detailed_logs: true
      register: update_services_result

    - name: Display update result
      ansible.builtin.debug:
        msg: "{{ update_services_result.msg }}"

    - name: Get updated Data Exchange services summary
      graphiant.naas.graphiant_data_exchange_info:
        <<: *graphiant_client_params
        query: services_summary
        detailed_logs: true
      register: services_summary_after

    - name: Display updated services summary
      ansible.builtin.debug:
        msg: "{{ services_summary_after.msg }}"
