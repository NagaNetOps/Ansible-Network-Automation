---
# Data Exchange - Match Services to Customers Playbook (Workflow 3)
# Matches Data Exchange services to customers. Idempotent: already-matched pairs are skipped.
#
# Usage:
#   Apply matches:
#     ansible-playbook ansible_collections/graphiant/naas/playbooks/de_workflows/03_dataex_match_services_to_customers.yml
#
#   Custom config file:
#     ansible-playbook ... -e config_file=de_workflows_configs/sample_data_exchange_matches.yaml

- name: Data Exchange - Match Services to Customers
  hosts: localhost
  gather_facts: false
  vars:
    graphiant_client_params: &graphiant_client_params
      host: "{{ graphiant_host | default(lookup('env', 'GRAPHIANT_HOST')) }}"
      username: "{{ graphiant_username | default(lookup('env', 'GRAPHIANT_USERNAME')) }}"
      password: "{{ graphiant_password | default(lookup('env', 'GRAPHIANT_PASSWORD')) }}"
      access_token: "{{ graphiant_access_token | default(lookup('env', 'GRAPHIANT_ACCESS_TOKEN')) }}"

  tasks:
    - name: Get Data Exchange services summary
      graphiant.naas.graphiant_data_exchange_info:
        <<: *graphiant_client_params
        query: services_summary
        detailed_logs: true
      register: services_summary

    - name: Display services summary
      ansible.builtin.debug:
        msg: "{{ services_summary.msg }}"

    - name: Get Data Exchange customers summary
      graphiant.naas.graphiant_data_exchange_info:
        <<: *graphiant_client_params
        query: customers_summary
        detailed_logs: true
      register: customers_summary

    - name: Display customers summary
      ansible.builtin.debug:
        msg: "{{ customers_summary.msg }}"

    - name: Match Data Exchange services to customers
      graphiant.naas.graphiant_data_exchange:
        <<: *graphiant_client_params
        operation: match_service_to_customers
        config_file: "{{ config_file | default('de_workflows_configs/sample_data_exchange_matches.yaml') }}"
        detailed_logs: true
      register: match_result

    - name: Display match result
      ansible.builtin.debug:
        msg: "{{ match_result.msg }}"

    - name: Get updated customers summary
      graphiant.naas.graphiant_data_exchange_info:
        <<: *graphiant_client_params
        query: customers_summary
        detailed_logs: true
      register: updated_customers_summary

    - name: Display updated customers count
      ansible.builtin.debug:
        msg: "{{ updated_customers_summary.msg }}"
