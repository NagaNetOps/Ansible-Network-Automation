---
- name: Playbook Demo
  hosts: all
  gather_facts: true

  tasks:
    - name: Print ansible Config location
      ansible.builtin.debug:
        msg:
          - "{{ ansible_config_file }}"
          - "{{ inventory_file }}"
          - "{{ ansible_facts }}"

    - name: Print Router hostname
      ansible.builtin.debug:
        msg:
          - "{{ ansible_host }}"
          - "{{ ansible_facts.net_hostname }}"
          - "{{ ansible_facts.net_version }}"
