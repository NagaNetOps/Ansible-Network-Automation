---
- name: Cisco ios facts demo
  hosts: R1
  gather_facts: false

  tasks:
    - name: Gather IOS facts
      cisco.ios.ios_facts:
        gather_subset: all

    - name: Print ansible_facts
      debug:
        var: ansible_facts
    - name: print ansible facts
      debug:
        msg:
         - "{{ ansible_facts }}"

  